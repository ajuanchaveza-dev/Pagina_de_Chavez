<html>
<head>
<title>EL TRIO DINAMITA</title>
<style>
*{
    padding: 0px;
    margin: 0px;
}
.contenedor{
    width: 600px;
    height: 300px;
    border: 1px solid black;
    margin: 0 auto;
    position: relative;
    overflow: hidden;
}
.tarjeta1, .tarjeta2, .tarjeta3{
    width: 200px;
    height: 300px;
    position: absolute;
    top: -300px;
    background-size: cover;
}
.tarjeta1{
    background-image: url(img/HTML.jpg);
    left: 0px;
    animation: tarjeta1 3s 1 forwards;
}
.tarjeta2{
    background-image: url(img/CSS3.jpg);
    left: 200px;
    animation: tarjeta2 3s 1 forwards 3s;
}
.tarjeta3{
    background-image: url(img/JS.jpg);
    left: 400px;
    animation: tarjeta3 3s 1 forwards 6s;
}

@keyframes tarjeta1{
    0%{
        top:-300px;
        transform: skewY(180deg);
    }
    50%{
        top:300px;
    }
    100%{
        top:0px;
    }
}

@keyframes tarjeta2{
    0%{
        top:-300px;
        transform: skewX(180deg);
    }
    50%{
        top:300px;
    }
    100%{
        top:0px;
    }
}

@keyframes tarjeta3{
    0%{
        top:-300px;
        transform: skewY(180deg);
    }
    50%{
        top:300px;
    }
    100%{
        top:0px;
    }
}
/*EVENTOS*/
.tarjeta1:hover{
    transition: 1s ;
    scale: 1.2;
    z-index: 1;
}
.tarjeta2:hover{
    transition: 1s ;
    scale: 1.2;
    z-index: 1;
}
.tarjeta3:hover{
    transition: 1s ;
    scale: 1.2;
    z-index: 1;
}

.bottom{
    border: 2px solid black;
    color: white;
    border-radius: 50px;
    width: 50px;
}

        </style>
    </head>
    <body>
       <div class="bottom"> <a href="../index.html">Atras </a></div>
<div class="contenedor">
    <div class="tarjeta1"></div>
    <div class="tarjeta2"></div>
    <div class="tarjeta3"></div>
</div>
</body>
</html>
