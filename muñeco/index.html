<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLIP PATH CSS</title>
    <style>
        *{
    padding:0px;
    margin: 0px;
}
.contenedor{
    width: 400px;
    height: 400px;
    background-color: aquamarine;
    position: relative;
    margin: 0 auto;
    overflow: hidden;
}


.cabeza{
    width: 100px;
    height: 100px;
    background-color: rgb(255, 255, 255);
    clip-path: circle(27.3% at 50% 50%);
    position: absolute;
    left: 140px;
    top: 170px;

}

.cuerpo{
    width: 100px;
    height: 100px;
    background-color: rgb(255, 255, 255);
    clip-path: circle(42.2% at 50% 50%);
    position: absolute;
    left: 140px;
    top: 230px;

    }
.brazo_izquierdo{
    width: 100px;
    height: 50px;
    background-color: rgb(255, 255, 255);
   clip-path: polygon(0% 20%, 60% 20%, 60% 0%, 100% 50%, 60% 100%, 60% 80%, 0% 80%);
    position: absolute;
    left: 200px;
    top: 250px;


}
.brazo_derecha{
    width: 120px;
    height: 50px;
    background-color: rgb(255, 255, 255);
    clip-path: polygon(40% 0%, 40% 20%, 100% 20%, 100% 80%, 40% 80%, 40% 100%, 0% 50%);
    position: absolute;
    left: 70px;
    top: 250px;

}

.pierna_derecha{
    width: 100px;
    height: 100px;
    background-color: rgb(0, 0, 0);
   clip-path: ellipse(24% 12% at 50% 50%);
    position: absolute;
    left: 110px;
    top: 280px;

}
.pierna_izquierda{
    width: 100px;
    height: 100px;
    background-color: rgb(0, 0, 0);
    clip-path: ellipse(24% 12% at 50% 50%);
    position: absolute;
    left: 170px;
    top: 280px;

}
 
    .bottom{
    border: 2px solid black;
    color: white;
    border-radius: 50px;
    width: 50px;
}
        </style>
    </head>
    <body>
       <div class="bottom"> <a href="../index.html">Atras </a></div>
    <div class="contenedor">
    <div class="cabeza"><img src="img/cara-de-muñeco-nieve-vector-cabeza-ilustración-vectores-aislada-en-fondo-blanco-165747101.webp" alt="" width="100"></div>
    <div class="brazo_izquierdo"><img src="" alt="" ></div>
    <div class="brazo_derecha"><img src="" alt="" ></div>
    <div class="pierna_derecha"></div>
    <div class="pierna_izquierda"></div>
     <div class="cuerpo"><img src="img/images.jpg" alt="" width="500"></div>
</div>
</body>
</html>
